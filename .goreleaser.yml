version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ocd-smoke-alarm
    main: ./cmd/ocd-smoke-alarm
    binary: ocd-smoke-alarm
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: ocd-smoke-alarm
    builds: [ocd-smoke-alarm]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
