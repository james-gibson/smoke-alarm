version: "1"

tuner:
  enabled: false
  advertise: false
  service_type: "_smoke-alarm._tcp"
health:
  enabled: true
  listen_addr: "localhost:17087"
  endpoints:
    healthz: "/healthz"
    readyz: "/readyz"
    status: "/status"
service:
  name: “demo-manager” # e.g., "ocd-smoke-alarm"
  environment: “demo-A” # Environment tag

known_state:
  enabled: true
  persist: true
  sustain_success_before_mark_healthy: 5
  classify_new_failures_after_healthy_as: "outage" # "regression" | "outage"
  outage_threshold_consecutive_failures: 10

targets:
  - id: "d-manager-status"
    enabled: true
    protocol: "http"
    name: "Demo Manager: Status"
    endpoint: "http://localhost:17087/status"
    transport: "http"
    expected:
      healthy_status_codes: [200]
    check:
      interval: "5s"
      timeout: "1s"
      retries: 0
      handshake_profile: "none"
  - id: "d-manager-host"
    enabled: true
    protocol: "http"
    name: "Demo Manager: Host"
    endpoint: "http://localhost:17087/healthz"
    transport: "http"
    expected:
      healthy_status_codes: [200]
    check:
      interval: "5s"
      timeout: "1s"
      retries: 0
      handshake_profile: "none"
      required_methods:
        - "tools/list"
        - "resources/list"
  - id: "d-a-client-alarm-b"
    enabled: true
    protocol: "http"
    name: "Client A: Alarm B"
    endpoint: "http://localhost:18088/status"
    transport: "http"
    expected:
      expected_version: ">=v0.6.8"
      healthy_status_codes: [200]
    check:
      interval: "5s"
      timeout: "1s"
      retries: 0
      handshake_profile: "none"
  - id: "d-a-client-alarm-a"
    enabled: true
    protocol: "http"
    name: "Client A: Alarm A"
    endpoint: "http://localhost:18087/status"
    transport: "http"
    expected:
      expected_version: ">=v0.6.8"
      healthy_status_codes: [200]
    check:
      interval: "5s"
      timeout: "1s"
      retries: 0
      handshake_profile: "none"
  - id: "h-a-alarm-downstream-b"
    enabled: false
    protocol: "http"
    name: "Host A: Upstream Check"
    endpoint: "http://riversong-4.local:18087/status"
    transport: "http"
    expected:
      expected_version: ">=v0.6.8"
      healthy_status_codes: [200]
    check:
      interval: "15s"
      timeout: "3s"
      retries: 2
      handshake_profile: "none"


  - id: "d-introducer"
    enabled: true
    protocol: "http"
    name: "demo-introducer-membership"
    endpoint: "http://localhost:17088/membership"
    transport: "http"
    expected:
      healthy_status_codes: [200]
      expected_version: ">=v0.6.8"
    check:
      interval: "15s"
      timeout: "3s"
      retries: 0
      handshake_profile: "none"

  - id: "ld-tuner"
    enabled: true
    protocol: "http"
    name: "Host A: tuner"
    endpoint: "http://localhost:58093/channels"
    transport: "http"
    expected:
      healthy_status_codes: [200]
    check:
      interval: "15s"
      timeout: "3s"
      retries: 0
      handshake_profile: "none"

  - id: "ld-local"
    enabled: true
    protocol: "http"
    name: "Host A: lezz demo"
    endpoint: "http://localhost:19100/cluster"
    transport: "http"
    expected:
      healthy_status_codes: [200]
    check:
      interval: "15s"
      timeout: "3s"
      retries: 0
      handshake_profile: "none"

  - id: "ld-upstream"
    enabled: true
    protocol: "http"
    name: "Host Jack: lezz demo"
    endpoint: "http://jack.internal.datawhore.house:19100/cluster"
    transport: "http"
    expected:
      healthy_status_codes: [200]
    check:
      interval: "15s"
      timeout: "3s"
      retries: 0
      handshake_profile: "none"


federation:
  enabled: true
  base_port: 17088
  downstream: ["localhost:19100/cluster","jack.internal.datawhore.house:19100/cluster"]
  #upstream: "riversong-4.local:19100/cluster"
remote_agent:
  #  managed_updates: true
  #  control_endpoint: "jack.internal.datawhore.house:19100/status
  update:
    strategy: "rolling-single"
    stop_command: "ocd-smoke-alarm ops stop"
    start_command: "ocd-smoke-alarm serve --mode=background --config=./config.yaml"
    verify_command: "ocd-smoke-alarm check --config=./config.yaml"
    rollback_on_failure: false
    max_wait_for_healthy: "90s"
  safety:
    require_lock: true

dynamic_config:
  enabled: true
  allow_overwrite: false

alerts:
  aggressive: false
  notify_on_regression_immediately: false
  retry_before_escalation: 0
  dedupe_window: "2m"
  cooldown: "300s"
  severity:
    healthy: "info"
    degraded: "warn"
    regression: "critical"
    outage: "critical"
  sinks:
    log:
      enabled: true
    os_notification:
      enabled: false
      title_prefix: “[idle alarm]”
