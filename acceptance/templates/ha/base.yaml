targets:
  # Primary A - the "preferred" node
  - id: "ha-primary-a"
    enabled: true
    protocol: "mcp"
    name: "HA: Primary A (Preferred)"
    endpoint: "http://localhost:19100/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
      min_capabilities:
        - "tools/list"
    check:
      interval: "3s"
      timeout: "2s"
      retries: 0
      handshake_profile: "strict"
      required_methods:
        - "initialize"
        - "tools/list"

  # Primary B - the "standby" node
  - id: "ha-primary-b"
    enabled: true
    protocol: "mcp"
    name: "HA: Primary B (Standby)"
    endpoint: "http://localhost:19102/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
      min_capabilities:
        - "tools/list"
    check:
      interval: "3s"
      timeout: "2s"
      retries: 0
      handshake_profile: "strict"
      required_methods:
        - "initialize"
        - "tools/list"

  # Shared state store (both primaries depend on this)
  - id: "ha-shared-store"
    enabled: true
    protocol: "mcp"
    name: "HA: Shared State Store"
    endpoint: "http://localhost:19110/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
    check:
      interval: "5s"
      timeout: "2s"
      retries: 0
      handshake_profile: "none"

  # Load balancer front-end (where traffic enters)
  - id: "ha-load-balancer"
    enabled: true
    protocol: "http"
    name: "HA: Load Balancer"
    endpoint: "http://localhost:19120/healthz"
    transport: "http"
    expected:
      healthy_status_codes: [200, 204]
    check:
      interval: "3s"
      timeout: "1s"
      retries: 0
      handshake_profile: "none"
