version: "1"

# deployment-canary.yaml
#
# Blue-green / Canary deployment patterns.
# Two versions of the same service running simultaneously.
#
# Use case: Warroom scenario for safe rollouts:
#   - Blue: current production (stable)
#   - Green: new version (testing)
#
# Smoke alarm verifies:
#   - Both versions respond
#   - Green has expected new capabilities
#   - Response consistency between versions (no data corruption)
#
# During rollout: increase Green traffic, verify Green stays healthy.
# Rollback: point traffic back to Blue, verify Blue is still healthy.

service:
  name: "ocd-smoke-alarm"
  environment: "deployment-canary"
  mode: "foreground"
  log_level: "info"
  poll_interval: "5s"
  timeout: "3s"
  max_workers: 8

health:
  enabled: true
  listen_addr: "127.0.0.1:18088"
  endpoints:
    healthz: "/healthz"
    readyz: "/readyz"
    status: "/status"

runtime:
  lock_file: "/tmp/ocd-smoke-alarm.deployment-canary.lock"
  state_dir: "./state/deployment-canary"
  baseline_file: "./state/deployment-canary/known-good.json"
  event_history_size: 800
  graceful_shutdown_timeout: "10s"

discovery:
  enabled: false

alerts:
  aggressive: true
  notify_on_regression_immediately: true
  retry_before_escalation: 1
  dedupe_window: "15s"
  cooldown: "10s"
  severity:
    healthy: "info"
    degraded: "warn"
    regression: "critical"
    outage: "critical"
  sinks:
    log:
      enabled: true
    os_notification:
      enabled: true
      title_prefix: "[Canary]"

auth:
  keystore:
    enabled: false
  redaction:
    enabled: true
    mask: "****"
  oauth:
    enabled: false

targets:
  # BLUE: Current production version
  - id: "canary-blue"
    enabled: true
    protocol: "mcp"
    name: "Canary: Blue (Current Production)"
    endpoint: "http://127.0.0.1:19001/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
      min_capabilities:
        - "tools/list"
        - "resources/list"
      known_agent_count_min: 1
      expected_version: ">=1.0.0 <2.0.0"
    auth:
      type: "none"
    check:
      interval: "5s"
      timeout: "3s"
      retries: 0
      handshake_profile: "strict"
      required_methods:
        - "initialize"
        - "tools/list"

  # GREEN: New version being tested
  - id: "canary-green"
    enabled: true
    protocol: "mcp"
    name: "Canary: Green (New Version)"
    endpoint: "http://127.0.0.1:19002/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
      min_capabilities:
        - "tools/list"
        - "resources/list"
        - "prompts/list"
      known_agent_count_min: 1
      expected_version: ">=2.0.0"
    auth:
      type: "none"
    check:
      interval: "5s"
      timeout: "3s"
      retries: 0
      handshake_profile: "strict"
      required_methods:
        - "initialize"
        - "tools/list"

  # Compare tool counts between versions (detect regressions)
  - id: "canary-comparison-helper"
    enabled: false
    protocol: "mcp"
    name: "Canary: Comparison Logic"
    endpoint: "http://127.0.0.1:19003/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
    check:
      interval: "10s"
      timeout: "5s"
      retries: 0
      handshake_profile: "none"

known_state:
  enabled: true
  persist: true
  sustain_success_before_mark_healthy: 2
  classify_new_failures_after_healthy_as: "regression"
  outage_threshold_consecutive_failures: 2

meta_config:
  enabled: true
  output_dir: "./state/deployment-canary/meta-config"
  formats:
    - "json"
    - "markdown"

dynamic_config:
  enabled: true
  directory: "./state/deployment-canary/dynamic-config"
  formats:
    - "json"
  allow_overwrite: true
  require_unique_ids: true

hosted:
  enabled: false

federation:
  enabled: false
