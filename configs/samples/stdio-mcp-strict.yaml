version: "1"

service:
  name: "ocd-smoke-alarm"
  environment: "sample-stdio-mcp-strict"
  mode: "foreground" # foreground | background
  log_level: "info"
  poll_interval: "5s"
  timeout: "4s"
  max_workers: 2

health:
  enabled: true
  listen_addr: "127.0.0.1:18188"
  endpoints:
    healthz: "/healthz"
    readyz: "/readyz"
    status: "/status"

runtime:
  lock_file: "/tmp/ocd-smoke-alarm.stdio-mcp-strict.lock"
  state_dir: "./state/stdio-mcp-strict"
  baseline_file: "./state/stdio-mcp-strict/known-good.json"
  event_history_size: 300
  graceful_shutdown_timeout: "8s"

discovery:
  enabled: false
  interval: "60s"
  include_local_paths:
    - "~/.config/mcp"
  include_env_vars:
    - "MCP_SERVER_URL"
  local_proxy_scan:
    enabled: false
    hosts:
      - "127.0.0.1"
    ports: [3000]
  cloud_catalog:
    enabled: false
    urls: []
  llms_txt:
    enabled: false
    remote_uris: []
    fetch_timeout: "5s"
    require_https: true
    auto_register_as_targets: false
    auto_register_oauth: false

alerts:
  aggressive: true
  notify_on_regression_immediately: true
  retry_before_escalation: 1
  dedupe_window: "30s"
  cooldown: "10s"
  severity:
    healthy: "info"
    degraded: "warn"
    regression: "critical"
    outage: "critical"
  sinks:
    log:
      enabled: true
    os_notification:
      enabled: false
      title_prefix: "[Smoke Alarm]"

auth:
  keystore:
    enabled: false
    provider: "auto"
  redaction:
    enabled: true
    mask: "****"
  oauth:
    enabled: false
    token_grace_period: "30s"
    unattended:
      enabled: false
      allow_device_code: false
      allow_client_credentials: false
      allow_refresh_token: false
    mock_redirect:
      enabled: false
      listen_addr: "127.0.0.1:8877"
      path: "/oauth/callback"
      mode: "allow"

targets:
  - id: "mcp-stdio-filesystem-strict"
    enabled: true
    protocol: "mcp"
    name: "MCP Filesystem Server (stdio strict)"
    endpoint: "stdio://local"
    transport: "stdio"
    stdio:
      command: "npx"
      args:
        - "-y"
        - "@modelcontextprotocol/server-filesystem"
        - "."
      env:
        MCP_LOG_LEVEL: "warn"
      cwd: "."
    expected:
      healthy_status_codes: [200]
      min_capabilities:
        - "tools/list"
        - "resources/list"
      known_agent_count_min: 0
      expected_version: ""
    auth:
      type: "none"
      secret_ref: ""
      header: ""
      key_name: ""
      client_id: ""
      token_url: ""
      redirect_url: ""
      callback_id: ""
      scopes: []
    check:
      interval: "6s"
      timeout: "5s"
      retries: 0
      handshake_profile: "strict"
      required_methods:
        - "initialize"
        - "tools/list"
        - "resources/list"
      hurl_tests: []

known_state:
  enabled: true
  persist: true
  sustain_success_before_mark_healthy: 1
  classify_new_failures_after_healthy_as: "regression"
  outage_threshold_consecutive_failures: 2

meta_config:
  enabled: true
  output_dir: "./state/stdio-mcp-strict/meta-config"
  formats:
    - "yaml"
    - "json"
  include_confidence: true
  include_provenance: true
  placeholders:
    token: "${TOKEN}"
    client_secret: "${CLIENT_SECRET}"
    endpoint: "${ENDPOINT}"

remote_agent:
  managed_updates: false
  control_endpoint: ""
  update:
    strategy: "rolling-single"
    stop_command: ""
    start_command: ""
    verify_command: ""
    rollback_on_failure: true
    max_wait_for_healthy: "30s"
  safety:
    require_lock: true
    lock_ttl: "2m"

hosted:
  enabled: false
  listen_addr: "127.0.0.1:8091"
  transports:
    - "http"
    - "sse"
  protocols:
    - "mcp"
    - "acp"
  endpoints:
    mcp: "/mcp"
    acp: "/acp"
    a2a: "/a2a"

dynamic_config:
  enabled: true
  directory: "./state/stdio-mcp-strict/dynamic-config"
  formats:
    - "json"
    - "markdown"
  serve_base_url: "/dynamic-config"
  allow_overwrite: false
  require_unique_ids: true
