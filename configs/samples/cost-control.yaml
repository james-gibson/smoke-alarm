version: "1"

# cost-control.yaml
#
# Usage tracking and cost alerting.
# Many MCP/ACP providers charge per request.
#
# Use case: Warroom scenario for budget awareness:
#   - Track request counts per agent
#   - Alert on unusual spikes (possible runaway loops)
#   - Verify rate limiting kicks in correctly
#   - Catch "infinite loop" bugs before bill shocks
#
# This config emphasizes:
#   - Frequent polling to catch issues fast
#   - Retry limits (each retry = more $)
#   - Baseline deviation detection

service:
  name: "ocd-smoke-alarm"
  environment: "cost-control"
  mode: "foreground"
  log_level: "info"
  poll_interval: "15s"
  timeout: "5s"
  max_workers: 8

health:
  enabled: true
  listen_addr: "localhost:18088"
  endpoints:
    healthz: "/healthz"
    readyz: "/readyz"
    status: "/status"

runtime:
  lock_file: "/tmp/ocd-smoke-alarm.cost-control.lock"
  state_dir: "./state/cost-control"
  baseline_file: "./state/cost-control/known-good.json"
  event_history_size: 500
  graceful_shutdown_timeout: "10s"

discovery:
  enabled: false

alerts:
  aggressive: true
  notify_on_regression_immediately: true
  retry_before_escalation: 0
  dedupe_window: "1m"
  cooldown: "30s"
  severity:
    healthy: "info"
    degraded: "warn"
    regression: "critical"
    outage: "critical"
  sinks:
    log:
      enabled: true
    os_notification:
      enabled: true
      title_prefix: "[Cost]"

auth:
  keystore:
    enabled: false
  redaction:
    enabled: true
    mask: "****"
  oauth:
    enabled: false

targets:
  # Expensive API (charges per call)
  - id: "cost-gpt4-api"
    enabled: true
    protocol: "mcp"
    name: "Cost: GPT-4 API Proxy"
    endpoint: "http://localhost:19401/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
      min_capabilities:
        - "tools/list"
    check:
      interval: "20s"
      timeout: "10s"
      retries: 0
      handshake_profile: "strict"
      required_methods:
        - "initialize"
        - "tools/list"

  # Moderate cost API
  - id: "cost-gpt3-api"
    enabled: true
    protocol: "mcp"
    name: "Cost: GPT-3.5 API Proxy"
    endpoint: "http://localhost:19402/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
    check:
      interval: "20s"
      timeout: "8s"
      retries: 0
      handshake_profile: "strict"
      required_methods:
        - "initialize"
        - "tools/list"

  # Free local agent (no cost concern)
  - id: "cost-local-agent"
    enabled: true
    protocol: "mcp"
    name: "Cost: Local Agent (Free)"
    endpoint: "http://localhost:19403/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
    check:
      interval: "30s"
      timeout: "5s"
      retries: 1
      handshake_profile: "strict"
      required_methods:
        - "initialize"
        - "tools/list"

  # External service with rate limits
  - id: "cost-rate-limited"
    enabled: true
    protocol: "mcp"
    name: "Cost: Rate-Limited External Service"
    endpoint: "http://localhost:19404/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200, 429]
    check:
      interval: "15s"
      timeout: "5s"
      retries: 0
      handshake_profile: "none"
      hurl_tests:
        - name: "rate-limit-check"
          endpoint: "http://localhost:19404/rate-limit-status"
          method: "GET"

known_state:
  enabled: true
  persist: true
  sustain_success_before_mark_healthy: 1
  classify_new_failures_after_healthy_as: "regression"
  outage_threshold_consecutive_failures: 3

meta_config:
  enabled: false

telemetry:
  enabled: true
  endpoint: "http://localhost:19450/otel"
  service_name: "ocd-smoke-alarm-cost"
  export_interval: "30s"

hosted:
  enabled: false

federation:
  enabled: false
