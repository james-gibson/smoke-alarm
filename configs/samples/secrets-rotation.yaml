version: "1"

# secrets-rotation.yaml
#
# Secrets rotation verification.
# OAuth tokens, API keys, certificates all expire.
#
# Use case: Warroom scenario during maintenance windows:
#   - Tokens expire every N hours
#   - Smoke alarm verifies new tokens work
#   - Alerts when rotation fails (service starts failing)
#
# Key difference from normal monitoring:
#   - Expects transient failures during rotation window
#   - Verifies tokens REFRESH, not just exist

service:
  name: "ocd-smoke-alarm"
  environment: "secrets-rotation"
  mode: "foreground"
  log_level: "info"
  poll_interval: "10s"
  timeout: "5s"
  max_workers: 4

health:
  enabled: true
  listen_addr: "127.0.0.1:18088"
  endpoints:
    healthz: "/healthz"
    readyz: "/readyz"
    status: "/status"

runtime:
  lock_file: "/tmp/ocd-smoke-alarm.secrets-rotation.lock"
  state_dir: "./state/secrets-rotation"
  baseline_file: "./state/secrets-rotation/known-good.json"
  event_history_size: 400
  graceful_shutdown_timeout: "10s"

discovery:
  enabled: false

alerts:
  aggressive: false
  notify_on_regression_immediately: false
  retry_before_escalation: 3
  dedupe_window: "2m"
  cooldown: "1m"
  severity:
    healthy: "info"
    degraded: "warn"
    regression: "critical"
    outage: "critical"
  sinks:
    log:
      enabled: true
    os_notification:
      enabled: true
      title_prefix: "[Secrets]"

auth:
  keystore:
    enabled: true
    provider: "auto"
  redaction:
    enabled: true
    mask: "****"
  oauth:
    enabled: true
    token_grace_period: "60s"
    unattended:
      enabled: true
      allow_device_code: true
      allow_client_credentials: true
      allow_refresh_token: true
    mock_redirect:
      enabled: true
      listen_addr: "127.0.0.1:8877"
      path: "/oauth/callback"
      mode: "allow"

targets:
  # Service with short-lived tokens (5 min expiry)
  - id: "secrets-oauth-short"
    enabled: true
    protocol: "mcp"
    name: "Secrets: Short-lived OAuth Token"
    endpoint: "http://127.0.0.1:19201/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
      min_capabilities:
        - "tools/list"
    auth:
      type: "oauth"
      client_id: "smoke-alarm-short"
      token_url: "http://127.0.0.1:19250/oauth/token"
      redirect_url: "http://127.0.0.1:8877/oauth/callback"
      callback_id: "secrets-short-callback"
      secret_ref: "keychain://ocd-smoke-alarm/secrets/oauth-short"
      scopes:
        - "mcp.access"
    check:
      interval: "30s"
      timeout: "5s"
      retries: 2
      handshake_profile: "strict"
      required_methods:
        - "initialize"
        - "tools/list"

  # Service with rotating API key
  - id: "secrets-api-key"
    enabled: true
    protocol: "mcp"
    name: "Secrets: Rotating API Key"
    endpoint: "http://127.0.0.1:19202/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
      min_capabilities:
        - "tools/list"
    auth:
      type: "bearer"
      header: "X-API-Key"
      secret_ref: "keychain://ocd-smoke-alarm/secrets/api-key"
    check:
      interval: "30s"
      timeout: "5s"
      retries: 2
      handshake_profile: "strict"
      required_methods:
        - "initialize"
        - "tools/list"

  # Service requiring client certificate
  - id: "secrets-mtls"
    enabled: false
    protocol: "mcp"
    name: "Secrets: mTLS Certificate"
    endpoint: "http://127.0.0.1:19203/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
    auth:
      type: "mtls"
      cert_ref: "keychain://ocd-smoke-alarm/secrets/client-cert"
      key_ref: "keychain://ocd-smoke-alarm/secrets/client-key"
    check:
      interval: "60s"
      timeout: "10s"
      retries: 1
      handshake_profile: "strict"

known_state:
  enabled: true
  persist: true
  sustain_success_before_mark_healthy: 2
  classify_new_failures_after_healthy_as: "regression"
  outage_threshold_consecutive_failures: 4

meta_config:
  enabled: false

hosted:
  enabled: false

federation:
  enabled: false
