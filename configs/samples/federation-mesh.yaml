version: "1"

# federation-mesh.yaml
#
# Demonstrates a 3-instance federation mesh on localhost.
# Run three separate processes against this config (each gets its own state_dir
# and lock_file); they self-elect an introducer via slot claiming on ports 5100-5103.
#
# Instance 1: binds port 5100 → becomes introducer
# Instance 2: binds port 5101 → follower, announces to introducer
# Instance 3: binds port 5102 → follower, announces to introducer
#
# Usage (three terminals):
#   go run ./cmd/ocd-smoke-alarm serve --mode=foreground --config=configs/samples/federation-mesh.yaml
#
# Each process will self-assign its role. The introducer's membership view is
# readable at http://127.0.0.1:5100/membership once all three are running.

service:
  name: "ocd-smoke-alarm"
  environment: "federation-mesh-sample"
  mode: "foreground"
  log_level: "info"
  poll_interval: "5s"
  timeout: "3s"
  max_workers: 4

health:
  enabled: true
  # Each instance will bind its own health address based on its slot port.
  # Override per-instance with --health-addr if running manually.
  listen_addr: "127.0.0.1:18088"
  endpoints:
    healthz: "/healthz"
    readyz: "/readyz"
    status: "/status"

runtime:
  lock_file: "/tmp/ocd-smoke-alarm.federation-mesh.lock"
  state_dir: "./state/federation-mesh"
  baseline_file: "./state/federation-mesh/known-good.json"
  event_history_size: 300
  graceful_shutdown_timeout: "8s"

discovery:
  enabled: false
  interval: "60s"
  include_local_paths: []
  include_env_vars: []
  local_proxy_scan:
    enabled: false
    hosts: []
    ports: []
  cloud_catalog:
    enabled: false
    urls: []
  llms_txt:
    enabled: false
    remote_uris: []
    fetch_timeout: "5s"
    require_https: true
    auto_register_as_targets: false
    auto_register_oauth: false

alerts:
  aggressive: false
  notify_on_regression_immediately: true
  retry_before_escalation: 1
  dedupe_window: "30s"
  cooldown: "15s"
  severity:
    healthy: "info"
    degraded: "warn"
    regression: "critical"
    outage: "critical"
  sinks:
    log:
      enabled: true
    os_notification:
      enabled: false
      title_prefix: "[Smoke Alarm Federation]"

auth:
  keystore:
    enabled: false
    provider: "auto"
  redaction:
    enabled: true
    mask: "****"
  oauth:
    enabled: false
    token_grace_period: "30s"
    unattended:
      enabled: false
      allow_device_code: false
      allow_client_credentials: false
      allow_refresh_token: false

# No external targets in this sample — the federation itself is the subject.
# Add targets here to have each instance monitor them independently and
# share status via the federation poller.
targets: []

known_state:
  enabled: true
  persist: true
  sustain_success_before_mark_healthy: 1
  classify_new_failures_after_healthy_as: "regression"
  outage_threshold_consecutive_failures: 2

meta_config:
  enabled: false
  output_dir: "./state/federation-mesh/meta-config"
  formats:
    - "json"
  include_confidence: false
  include_provenance: false
  placeholders:
    token: "${TOKEN}"
    client_secret: "${CLIENT_SECRET}"
    endpoint: "${ENDPOINT}"

remote_agent:
  managed_updates: false
  control_endpoint: ""
  update:
    strategy: "rolling-single"
    stop_command: ""
    start_command: ""
    verify_command: ""
    rollback_on_failure: true
    max_wait_for_healthy: "30s"
  safety:
    require_lock: true
    lock_ttl: "2m"

hosted:
  enabled: false
  listen_addr: "127.0.0.1:18091"
  transports:
    - "http"
    - "sse"
  protocols:
    - "mcp"
    - "acp"
  endpoints:
    mcp: "/mcp"
    acp: "/acp"
    a2a: "/a2a"

dynamic_config:
  enabled: false
  directory: "./state/federation-mesh/dynamic-config"
  formats:
    - "json"
  serve_base_url: "/dynamic-config"
  allow_overwrite: true
  require_unique_ids: true

telemetry:
  enabled: false
  endpoint: ""
  service_name: "ocd-smoke-alarm-federation"
  export_interval: "30s"

federation:
  enabled: true

  # Slot claiming: the first process to bind base_port becomes the introducer.
  # Subsequent processes claim base_port+1, base_port+2, etc. as followers.
  # The introducer serves /introductions, /heartbeats, /membership on base_port.
  base_port: 5100
  max_port: 5103  # supports up to 4 instances (5100-5103)

  # How often followers poll downstream peers' /status endpoints.
  poll_interval: "5s"

  # How often each instance re-announces itself to the introducer.
  announce_interval: "10s"

  # Heartbeat cadence from follower to introducer.
  heartbeat_interval: "15s"

  # A peer missing this many consecutive heartbeat windows is aged out.
  heartbeat_timeout: "45s"

  # Upstream and downstream are left empty here — slot election is automatic.
  # For explicit topology, set:
  #   upstream: "127.0.0.1:5100"         # follower points at introducer
  #   downstream: ["127.0.0.1:5101"]     # introducer polls followers for /status
  upstream: ""
  downstream: []
  rank: 0  # 0 = auto-detect from claimed port
