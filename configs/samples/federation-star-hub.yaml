version: "1"

# federation-star-hub.yaml
#
# Hub-and-Spoke topology: one coordinator agent fans out to specialist agents.
# This is the "incident commander" pattern - one brain delegates to specialists.
#
# Use case: Warroom scenario where incident commander delegates to:
#   - File retrieval specialist
#   - Code search specialist
#   - Documentation specialist
#   - Deployment specialist
#
# The hub verifies each spoke responds, and verifies the hub can route correctly.

service:
  name: "ocd-smoke-alarm"
  environment: "federation-star"
  mode: "foreground"
  log_level: "info"
  poll_interval: "5s"
  timeout: "3s"
  max_workers: 6

health:
  enabled: true
  listen_addr: "localhost:18088"
  endpoints:
    healthz: "/healthz"
    readyz: "/readyz"
    status: "/status"

runtime:
  lock_file: "/tmp/ocd-smoke-alarm.federation-star.lock"
  state_dir: "./state/federation-star"
  baseline_file: "./state/federation-star/known-good.json"
  event_history_size: 500
  graceful_shutdown_timeout: "10s"

discovery:
  enabled: false

alerts:
  aggressive: true
  notify_on_regression_immediately: true
  retry_before_escalation: 1
  dedupe_window: "30s"
  cooldown: "15s"
  severity:
    healthy: "info"
    degraded: "warn"
    regression: "critical"
    outage: "critical"
  sinks:
    log:
      enabled: true

auth:
  keystore:
    enabled: false
  redaction:
    enabled: true
    mask: "****"
  oauth:
    enabled: false

targets:
  # The HUB - coordinator agent
  - id: "hub-coordinator"
    enabled: true
    protocol: "mcp"
    name: "Hub Coordinator Agent"
    endpoint: "http://localhost:18401/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
      min_capabilities:
        - "tools/list"
        - "resources/list"
    auth:
      type: "none"
    check:
      interval: "5s"
      timeout: "3s"
      retries: 0
      handshake_profile: "strict"
      required_methods:
        - "initialize"
        - "tools/list"

  # SPOKE 1 - File retrieval specialist
  - id: "spoke-files"
    enabled: true
    protocol: "mcp"
    name: "Spoke: Files Specialist"
    endpoint: "http://localhost:18402/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
      min_capabilities:
        - "tools/list"
    auth:
      type: "none"
    check:
      interval: "6s"
      timeout: "3s"
      retries: 0
      handshake_profile: "strict"
      required_methods:
        - "initialize"
        - "tools/list"

  # SPOKE 2 - Code search specialist
  - id: "spoke-search"
    enabled: true
    protocol: "mcp"
    name: "Spoke: Code Search Specialist"
    endpoint: "http://localhost:18403/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
      min_capabilities:
        - "tools/list"
    auth:
      type: "none"
    check:
      interval: "6s"
      timeout: "3s"
      retries: 0
      handshake_profile: "strict"
      required_methods:
        - "initialize"
        - "tools/list"

  # SPOKE 3 - Documentation specialist
  - id: "spoke-docs"
    enabled: true
    protocol: "mcp"
    name: "Spoke: Documentation Specialist"
    endpoint: "http://localhost:18404/mcp"
    transport: "http"
    expected:
      healthy_status_codes: [200]
      min_capabilities:
        - "tools/list"
    auth:
      type: "none"
    check:
      interval: "6s"
      timeout: "3s"
      retries: 0
      handshake_profile: "strict"
      required_methods:
        - "initialize"
        - "tools/list"

known_state:
  enabled: true
  persist: true
  sustain_success_before_mark_healthy: 1
  classify_new_failures_after_healthy_as: "regression"
  outage_threshold_consecutive_failures: 2

meta_config:
  enabled: true
  output_dir: "./state/federation-star/meta-config"
  formats:
    - "json"

hosted:
  enabled: false

federation:
  enabled: true
  base_port: 5200
  max_port: 5204
  poll_interval: "5s"
  announce_interval: "10s"
  heartbeat_interval: "15s"
  heartbeat_timeout: "45s"
  upstream: ""
  downstream: []
  rank: 0
