version: "2"

run:
  timeout: 5m
  tests: true
  issues-exit-code: 1

linters:
  default: none
  enable:
    # correctness
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - nilerr
    - noctx
    - staticcheck
    - unused

    # code quality
    - asciicheck
    - errorlint
    - gocritic
    - gosec
    - misspell
    - nakedret
    - prealloc
    - revive
    - unconvert
    - unparam

  settings:
    govet:
      enable:
        - shadow

    errcheck:
      check-type-assertions: true

    revive:
      confidence: 0.8
      rules:
        - name: var-naming
        - name: package-comments
        - name: exported
        - name: receiver-naming
        - name: increment-decrement
        - name: indent-error-flow
        - name: unexported-return
        - name: unnecessary-stmt

    misspell:
      locale: US

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - unnamedResult

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - noctx
          - prealloc
          - unparam

      - path: ^cmd/
        linters:
          - revive
        text: "should have a package comment"

      - path: ".*\\.gen\\.go"
        linters:
          - all

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
